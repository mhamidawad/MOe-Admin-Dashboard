services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: pos_db
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pos_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos_user -d pos_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: always
    environment:
      DATABASE_URL: postgresql://pos_user:${POSTGRES_PASSWORD:-pos_secure_password}@db:5432/pos_db
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      PORT: 8080
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  postgres_data:
